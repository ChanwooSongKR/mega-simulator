<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MEGA Simulator</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<div id="app-header">
  <span class="title">mega-simulator</span>
  <span>·</span>
  <span class="mode">Design Mode</span>
  <span>·</span>
  <span id="header-phase">Phase 0 of 4 — Research</span>
</div>

<div id="main">

  <!-- Left Panel -->
  <div id="left-panel">
    <div>
      <div class="panel-section-label">진행 상황</div>
      <div id="phase-list">
        <div class="phase-item active" data-phase="0">▶ Phase 0 · Research</div>
        <div class="phase-item" data-phase="1">Phase 1 · PRD</div>
        <div class="phase-item" data-phase="2">Phase 2 · Data</div>
        <div class="phase-item" data-phase="3">Phase 3 · Workflow</div>
      </div>
    </div>

    <div style="border-top:1px solid #21262d;padding-top:12px;">
      <div class="panel-section-label">수집된 정보</div>
      <div id="collected-list">
        <!-- Populated by app.js -->
      </div>
    </div>

    <div id="progress-section">
      <div class="panel-section-label">질문 진행</div>
      <div id="progress-bar-track"><div id="progress-bar-fill" style="width:0%"></div></div>
      <div id="progress-label">Phase 0</div>
    </div>
  </div>

  <!-- Right Panel -->
  <div id="right-panel">

    <!-- Context bubble -->
    <div id="context-bubble">
      <div class="bot-label">🤖 MEGA</div>
      <div id="context-text">안녕하세요! MEGA 시뮬레이터입니다. 시작하려면 잠시 기다려주세요...</div>
    </div>

    <!-- Question card (hidden until session starts) -->
    <div id="question-card" style="display:none;">
      <div class="question-meta">
        <div class="question-header-label" id="question-header"></div>
        <div id="hard-gate-badge" style="display:none;" class="hard-gate-badge">⚠️ HARD GATE</div>
      </div>
      <div class="question-text" id="question-text"></div>
      <div id="options-container"></div>
    </div>

    <!-- Completion screen -->
    <div id="completion-screen">
      <div id="completion-content"></div>
      <button type="button" class="restart-btn" onclick="restartSession()">🔄 다시 시작</button>
    </div>

  </div>
</div>

<!-- Phase history modal -->
<div id="history-modal-overlay" style="display:none;" onclick="closeHistoryModal()">
  <div id="history-modal" onclick="event.stopPropagation()">
    <div id="history-modal-title"></div>
    <div id="history-modal-body"></div>
    <button type="button" class="send-btn" onclick="closeHistoryModal()">닫기</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
