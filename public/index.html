<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MEGA Simulator</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .landing {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 2rem;
    }
    .landing-title {
      font-size: 2rem;
      font-weight: 700;
      color: #e2e8f0;
      letter-spacing: -0.02em;
    }
    .landing-subtitle {
      color: #64748b;
      font-size: 0.95rem;
      margin-top: -1.5rem;
    }
    .landing-buttons {
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .landing-btn {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.35rem;
      padding: 1.25rem 1.75rem;
      border-radius: 12px;
      border: 1px solid #1e293b;
      background: #0f172a;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.15s, background 0.15s;
      min-width: 220px;
    }
    .landing-btn:hover {
      border-color: #3b82f6;
      background: #1e293b;
    }
    .landing-btn-label {
      font-size: 1.05rem;
      font-weight: 600;
      color: #e2e8f0;
    }
    .landing-btn-desc {
      font-size: 0.8rem;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="landing">
    <div class="landing-title">MEGA Simulator</div>
    <div class="landing-subtitle">LLM 파이프라인 설계 시뮬레이터</div>
    <div class="landing-buttons">
      <a class="landing-btn" href="/flow">
        <span class="landing-btn-label">플로우 보기</span>
        <span class="landing-btn-desc">단계별 질문 흐름 및 수집 정보 확인</span>
      </a>
      <a class="landing-btn" href="/simulator">
        <span class="landing-btn-label">시뮬레이터 사용하기</span>
        <span class="landing-btn-desc">AI와 대화하며 파이프라인 설계</span>
      </a>
    </div>
  </div>
</body>
</html>
